<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>mpv Watch Together</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.6" opacity="0.5" />
              <path d="M10 8.5l5 3.5-5 3.5z" fill="currentColor" />
            </svg>
          </span>
          <div class="brand-text">
            <h1>mpv Watch Together</h1>
            <p id="subtitle">Local host dashboard</p>
          </div>
        </div>
        <div class="status" id="connectionStatus" role="status" aria-live="polite">
          <span class="status-dot" aria-hidden="true"></span>
          <span class="status-text" id="statusText">Connecting</span>
        </div>
      </header>

      <section class="controls panel">
        <div class="field-group">
          <label class="field">
            <span>Role</span>
            <select id="role">
              <option value="host">Host</option>
              <option value="guest">Guest</option>
            </select>
          </label>
          <label class="field">
            <span>Room</span>
            <input id="roomId" placeholder="room123" />
          </label>
          <label class="field">
            <span>Display name</span>
            <input id="displayName" placeholder="Movie night" />
          </label>
        </div>
        <div class="actions">
          <button id="saveConfig" class="btn btn-ghost" type="button">Save</button>
          <button id="toggleSync" class="btn btn-toggle" type="button" aria-pressed="false">
            <span class="btn-toggle-dot" aria-hidden="true"></span>
            <span class="btn-toggle-label">Sync Off</span>
          </button>
          <button id="forceSync" class="btn btn-accent" type="button">Force Sync</button>
          <button id="pushTracks" class="btn btn-accent" type="button">Push Tracks</button>
        </div>
      </section>

      <section class="settings-panel panel" id="settingsPanel">
        <div class="settings-head">
          <h2 class="panel-title">Room Settings</h2>
          <div class="settings-actions">
            <button id="resetSettings" class="btn btn-ghost" type="button">Reset</button>
            <button id="saveSettings" class="btn btn-ghost" type="button">Save Settings</button>
          </div>
        </div>
        <div class="settings-sections">
          <fieldset class="settings-group">
            <legend>Baseline Polling</legend>
            <div class="settings-grid">
              <label class="field" title="How often synced mpv clients ask the helper for commands when adaptive polling is off.">
                <span>Command poll</span>
                <input id="commandInterval" type="number" min="0.25" max="3" step="0.05" title="Fixed command polling interval in seconds." />
              </label>
            </div>
          </fieldset>

          <fieldset class="settings-group">
            <legend>Adaptive Polling</legend>
            <div class="settings-grid">
              <label class="check-field" title="Use faster polling around sync activity and slower polling while idle.">
                <input id="adaptivePolling" type="checkbox" title="Toggle adaptive command polling for synced mpv clients." />
                <span>Adaptive polling</span>
              </label>
              <label class="field" title="Polling interval used when no recent sync activity is happening.">
                <span>Idle poll</span>
                <input id="idleInterval" type="number" min="0.5" max="5" step="0.05" title="Idle adaptive polling interval in seconds." />
              </label>
              <label class="field" title="Polling interval used briefly after sync starts, force sync, track sync, or host snap activity.">
                <span>Active poll</span>
                <input id="activeInterval" type="number" min="0.25" max="2" step="0.05" title="Active adaptive polling interval in seconds." />
              </label>
              <label class="field" title="Maximum polling delay while a client is reconnecting to the helper.">
                <span>Reconnect max</span>
                <input id="reconnectBackoffMax" type="number" min="1" max="15" step="0.25" title="Maximum reconnect polling backoff in seconds." />
              </label>
            </div>
          </fieldset>

          <fieldset class="settings-group">
            <legend>Sync Behavior</legend>
            <div class="settings-grid">
              <label class="check-field" title="Keep guests snapped to the host if they seek too far away.">
                <input id="seekLock" type="checkbox" title="Toggle guest seek-lock behavior." />
                <span>Seek lock</span>
              </label>
              <label class="field" title="How far a guest can drift from the host before seek-lock snaps them back.">
                <span>Seek lock gap</span>
                <input id="seekLockThreshold" type="number" min="0.5" max="10" step="0.1" title="Guest seek-lock threshold in seconds." />
              </label>
              <label class="check-field" title="Send an automatic force sync when the host seeks far enough.">
                <input id="autoForceSyncOnSeek" type="checkbox" title="Toggle host auto-sync after seeking." />
                <span>Auto sync seek</span>
              </label>
              <label class="field" title="How large a host seek must be before auto-sync triggers.">
                <span>Host seek gap</span>
                <input id="hostSeekThreshold" type="number" min="0.5" max="10" step="0.1" title="Host seek auto-sync threshold in seconds." />
              </label>
              <label class="field" title="Minimum time between host auto-sync events after seeks.">
                <span>Seek cooldown</span>
                <input id="hostSeekCooldown" type="number" min="0.25" max="10" step="0.25" title="Host seek auto-sync cooldown in seconds." />
              </label>
            </div>
          </fieldset>
        </div>
      </section>

      <section class="grid">
        <article class="panel host-panel">
          <h2 class="panel-title">
            <span class="panel-title-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M8 6.5l9 5.5-9 5.5z" fill="currentColor" />
              </svg>
            </span>
            Now Playing
          </h2>
          <div id="hostState" class="host-state"></div>
        </article>
        <article class="panel">
          <h2 class="panel-title" id="guestHeading">
            <span class="panel-title-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                  d="M9 11a3 3 0 100-6 3 3 0 000 6zM3 19a6 6 0 0112 0M16.5 11a3 3 0 10-2-5.2M21 19a6 6 0 00-4.5-5.8"
                  stroke="currentColor"
                  stroke-width="1.6"
                  stroke-linecap="round"
                />
              </svg>
            </span>
            <span id="guestHeadingText">Guests</span>
          </h2>
          <div id="guestList" class="guest-list"></div>
        </article>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
